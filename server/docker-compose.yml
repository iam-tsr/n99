version: '1.0'

services:
  server:
    build: .
    image: n99-server:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SELENIUM_URL=http://selenium:4444/wd/hub
      - REDIS_URL=redis://redis:6379
    depends_on:
      - selenium
      - redis

  selenium:
    image: selenium/standalone-chrome:120.0
    ports:
      - "4444:4444"
    shm_size: 2gb
    environment:
      - SE_OPTS=--session-timeout 300
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - VNC_NO_PASSWORD=1

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5